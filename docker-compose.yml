services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: elitecode
      POSTGRES_PASSWORD: elitecode
      POSTGRES_DB: elitecode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data:
